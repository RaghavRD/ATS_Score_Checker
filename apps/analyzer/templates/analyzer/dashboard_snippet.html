{% load static %}

{% if stats %}
<div class="row g-3 mb-5 animate-slide-up">

    <!-- Total Scans -->
    <div class="col-6 col-md-3">
        <div class="stat-card">
            <div class="stat-label"><i class="bi bi-scan me-1"></i>Total Scans</div>
            <div class="stat-value">{{ stats.total_scans }}</div>
        </div>
    </div>

    <!-- Avg Score -->
    <div class="col-6 col-md-3">
        <div class="stat-card">
            <div class="stat-label"><i class="bi bi-graph-up me-1"></i>Avg Score</div>
            <div class="stat-value">{{ stats.average_score }}<span style="font-size:1.2rem;">%</span></div>
        </div>
    </div>

    <!-- Progress Chart -->
    <div class="col-12 col-md-6">
        <div class="stat-card" style="padding: 1rem 1.25rem;">
            <div class="stat-label mb-2"><i class="bi bi-activity me-1"></i>Score Over Time</div>
            <div style="height: 72px;">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const ctx = document.getElementById('progressChart').getContext('2d');
        const historyData = {{ stats.history|safe }};

        const labels     = historyData.map(item => item.date);
        const dataPoints = historyData.map(item => item.score);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: dataPoints,
                    borderColor: '#818cf8',
                    backgroundColor: 'rgba(99,102,241,0.08)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3,
                    pointBackgroundColor: '#818cf8',
                    pointBorderColor: 'transparent',
                    pointHoverRadius: 5,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: {
                    backgroundColor: '#18181d',
                    borderColor: 'rgba(255,255,255,0.08)',
                    borderWidth: 1,
                    titleColor: '#f1f5f9',
                    bodyColor: '#94a3b8',
                    padding: 10
                }},
                scales: {
                    x: { display: false },
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 4 },
                        border: { display: false }
                    }
                }
            }
        });
    });
</script>
{% endif %}
